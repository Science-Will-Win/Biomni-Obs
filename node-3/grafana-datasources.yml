apiVersion: 1

datasources:
  - name: Langfuse-Postgres
    type: postgres
    # [중요] url 대신 host를 사용해야 합니다.
    host: 172.17.0.1:5432
    # 쿼리 에러를 방지하기 위해 database 필드를 명확히 작성합니다.
    database: langfuse
    user: langfuse
    # 시스템에서 이 데이터 소스를 기본으로 인식하게 강제합니다.
    isDefault: true
    # UI에서 실제 값이 어떻게 들어갔는지 확인하기 위해 true로 설정합니다.
    editable: true
    secureJsonData:
      password: "langfuse_pass"
    jsonData:
      sslmode: "disable"
      # v12에서는 숫자형태를 문자열로 감싸지 않는 것을 권장합니다.
      postgresVersion: 16