version: "3.8"

services:
  neo4j:
    image: neo4j:5.12.0
    container_name: biomni-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/biomnipassword

  aigen-backend:
    image: jiyeonl/biomni-web_backend
    container_name: aigen-backend
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/biomni_repo:/app/backend_code:$PYTHONPATH
      - BIOMNI_DATA_PATH=/app/data
    volumes:
      # 런타임 데이터만 마운트 (이미지에 포함된 코드/레포는 마운트 제거)
      - ./:/app/data
      - ../uploads:/app/uploads
      - ../outputs:/app/outputs
      - ../logs:/app/logs
      - ./reasoning_logs:/app/reasoning_logs
      - ../models:/app/models
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8003:8000"
    depends_on:
      - aigen-db
      - neo4j
    restart: unless-stopped

  aigen-db:
    image: postgres:16-alpine
    container_name: aigen-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=aigen
      - POSTGRES_PASSWORD=aigen_pass
      - POSTGRES_DB=aigen
    volumes:
      - aigen-pgdata:/var/lib/postgresql/data

volumes:
  aigen-pgdata: