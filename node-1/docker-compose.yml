version: "3.8"

services:
  neo4j:
    image: neo4j:5.12.0
    container_name: biomni-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/biomnipassword

  aigen-backend:
    image: jiyeonl/biomni-web_backend
    container_name: aigen-backend
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/biomni_repo:/app/backend_code:$PYTHONPATH
      - BIOMNI_DATA_PATH=/app/data
    volumes:
      # biomni_data가 저장되는 경로 (node-1/data/)
      - ./data:/app/data
      # 런타임 데이터 (node-1 하위)
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./models:/app/models
      - ./reasoning_logs:/app/reasoning_logs
      # 사용자가 수정 가능한 설정 파일 (이미지 내부 기본값을 덮어씀)
      - ./model_registry.yaml:/app/backend_code/model_registry.yaml
      - /var/run/docker.sock:/var/run/docker.sock
      # 개발용 BE 코드 마운트 추가
      - ../../Biomni-Web-BE:/app/backend_code
      - ../../Biomni:/app/biomni_repo
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8003:8000"
    depends_on:
      - aigen-db
      - neo4j
    restart: unless-stopped

  aigen-db:
    image: postgres:16-alpine
    container_name: aigen-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=aigen
      - POSTGRES_PASSWORD=aigen_pass
      - POSTGRES_DB=aigen
    volumes:
      - aigen-pgdata:/var/lib/postgresql/data

volumes:
  aigen-pgdata: